name: Deploy Node App

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: windows-2025-vs2026

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/node-app
            git pull origin master
            npm install
            pm2 restart all