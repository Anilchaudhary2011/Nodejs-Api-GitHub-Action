name: Node.js CI/CD Pipeline

on:
  push:
    branches: ["master"]

  workflow_dispatch:

jobs:
  # ✅ 1. Test Job
  test:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

  # ✅ 2. Build Job
  build:
    needs: test
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build Website
        run: npm run build

  # 🚀 3. Deploy Job
  deploy:
    needs: build
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build Website
        run: npm run build

      - name: Deploy
        run: echo "Deploying to server..."