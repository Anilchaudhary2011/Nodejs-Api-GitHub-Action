name: CI/CD Pipeline workflow

on:
  push:
    branches: [ "master" ]
  # pull_request:
  #   branches: [ "master" ]
  workflow_dispatch:

jobs:

# ✅ 1. Test Job
  test:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

  # ✅ 1. Build Job
  build:
    needs: test
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build Website
        run: npm run build


  # 🚀 2. Deploy Job (runs only after build success)
  deploy:
    needs: build
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build Website
        run: npm run build
      - name: Deploy 
        uses: echo "Deploying to server..."
        # Here you can add your actual deployment steps, e.g., using SSH or FTP to transfer files to your server.